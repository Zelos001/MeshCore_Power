name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Run Unit Tests
        run: pio test -e native -vv

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: .pio/build/native/

  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Generate Matrix
        id: set
        run: |
          python3 - <<'EOF' >> "$GITHUB_OUTPUT"
          import json, subprocess
          data = json.loads(subprocess.check_output(["pio", "project", "config", "--json-output"]))
          envs = sorted(s[4:] for s, _ in data if s.startswith("env:") and s != "env:native")
          size = 4
          chunks = [" ".join(envs[i:i + size]) for i in range(0, len(envs), size)]
          print("matrix=" + json.dumps({"chunk": chunks}))
          EOF

  build:
    name: Build
    needs: generate-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    steps:
      - name: Clone Repo
        uses: actions/checkout@v6

      - name: Setup Build Environment
        uses: ./.github/actions/setup-build-environment

      - name: Build Environments
        run: |
          for env in ${{ matrix.chunk }}; do
            echo "::group::$env"
            pio run -e "$env"
            echo "::endgroup::"
          done
