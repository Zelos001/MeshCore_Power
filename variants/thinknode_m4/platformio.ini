# ─────────────────────────────────────────────
# ThinkNode M4 — nRF52840 + LR1110
# Bootloader: SoftDevice S140 v6.1.1
# Pin data from Meshtastic variants/nrf52840/ELECROW-ThinkNode-M4/variant.h
# ─────────────────────────────────────────────

[ThinkNode_M4]
extends = nrf52_base
board = thinknode_m4
board_build.ldscript = boards/nrf52840_s140_v6.ld
build_flags = ${nrf52_base.build_flags}
  -I src/helpers/nrf52
  -I src/helpers/ui
  -I lib/nrf52/s140_nrf52_6.1.1_API/include
  -I lib/nrf52/s140_nrf52_6.1.1_API/include/nrf52
  -I variants/thinknode_m4
  -D THINKNODE_M4=1
  -D RADIO_CLASS=CustomLR1110
  -D WRAPPER_CLASS=CustomLR1110Wrapper
  -D LORA_TX_POWER=22
  -D RF_SWITCH_TABLE
  -D RX_BOOSTED_GAIN=true
  -D LR11X0_DIO_AS_RF_SWITCH=true
  -D LR11X0_DIO3_TCXO_VOLTAGE=1.6
  -D ENV_INCLUDE_GPS=1
  -D P_LORA_NSS=27
  -D P_LORA_SCLK=6
  -D P_LORA_MOSI=7
  -D P_LORA_MISO=8
  -D P_LORA_RESET=40
  -D P_LORA_DIO_1=12
  -D P_LORA_BUSY=26
  -D PIN_GPS_EN=43
  -D GPS_EN_ACTIVE=LOW
  -D PIN_GPS_RESET=3
  -D PIN_GPS_STANDBY=28
  -D GPS_BAUDRATE=9600
  -D PIN_BUTTON1=4
  -D PIN_USER_BTN=4
  -D USER_BTN_PRESSED=LOW
  -D LED_HEARTBEAT=41
  -D LED_PAIRING=13
  -D LED_STATE_ON=1
build_src_filter = ${nrf52_base.build_src_filter}
  +<helpers/*.cpp>
  +<../variants/thinknode_m4>
debug_tool = jlink
upload_protocol = nrfutil
lib_deps =
  ${nrf52_base.lib_deps}
  adafruit/RTClib @ ^2.1.3
  adafruit/Adafruit BusIO @ ^1.16.1

# ─── Repeater ────────────────────────────────
[env:ThinkNode_M4_repeater]
extends = ThinkNode_M4
build_flags = ${ThinkNode_M4.build_flags}
  -D ADVERT_NAME='"TN-M4 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${ThinkNode_M4.build_src_filter}
  +<../examples/simple_repeater>
lib_deps = ${ThinkNode_M4.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6

# ─── Room Server ─────────────────────────────
[env:ThinkNode_M4_room_server]
extends = ThinkNode_M4
build_flags = ${ThinkNode_M4.build_flags}
  -D ADVERT_NAME='"TN-M4 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${ThinkNode_M4.build_src_filter}
  +<../examples/simple_room_server>
lib_deps = ${ThinkNode_M4.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6

# ─── Companion Radio (BLE) ───────────────────
[env:ThinkNode_M4_companion_ble]
extends = ThinkNode_M4
board_build.ldscript = boards/nrf52840_s140_v6_extrafs.ld
board_upload.maximum_size = 708608
build_flags = ${ThinkNode_M4.build_flags}
  -I examples/companion_radio/ui-orig
  -D MAX_CONTACTS=500
  -D MAX_GROUP_CHANNELS=40
  -D BLE_PIN_CODE=123456
  -D BLE_TX_POWER=0
  -D OFFLINE_QUEUE_SIZE=256
  -D DISPLAY_CLASS=NullDisplayDriver
  -D ADVERT_NAME='"@@MAC"'
build_src_filter = ${ThinkNode_M4.build_src_filter}
  +<helpers/nrf52/SerialBLEInterface.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-orig/*.cpp>
lib_deps = ${ThinkNode_M4.lib_deps}
  densaugeo/base64 @ ~1.4.0
  stevemarple/MicroNMEA @ ^2.0.6