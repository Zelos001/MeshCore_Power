[pico_dragino_sx1276]
extends = rp2040_base
board = pico
build_flags =
  ${rp2040_base.build_flags}
  -I variants/pico_dragino_sx1276
  -I variants/waveshare_rp2040_lora
  -D RADIO_CLASS=CustomSX1276
  -D WRAPPER_CLASS=CustomSX1276Wrapper
  -D SX127X_CURRENT_LIMIT=120
  -D LORA_TX_POWER=17
  -D LORA_FREQ=915.0
  -D P_LORA_DIO_0=6
  -D P_LORA_DIO_1=7
  -D P_LORA_RST=8
  -D P_LORA_SCLK=18
  -D P_LORA_MISO=16
  -D P_LORA_MOSI=19
  -D P_LORA_NSS=17
  -D ENV_INCLUDE_GPS=1
  -D PIN_GPS_RX=13
  -D PIN_GPS_TX=12
  -D setPins=setPinout
  -D ENV_SKIP_GPS_DETECT=1
  -D PERSISTANT_GPS=1
build_src_filter = ${rp2040_base.build_src_filter}
  +<../variants/pico_dragino_sx1276>
  +<../variants/waveshare_rp2040_lora/WaveshareBoard.cpp>
  +<helpers/sensors/EnvironmentSensorManager.cpp>
  +<helpers/sensors/MicroNMEALocationProvider.cpp>
lib_deps =
  ${rp2040_base.lib_deps}
  stevemarple/MicroNMEA @ ^2.0.6

[env:pico_dragino_companion_radio_usb]
extends = pico_dragino_sx1276
build_flags =
  ${pico_dragino_sx1276.build_flags}
  -D MAX_CONTACTS=100
  -D MAX_GROUP_CHANNELS=8
build_src_filter = ${pico_dragino_sx1276.build_src_filter}
  +<../examples/companion_radio/*.cpp>
lib_deps =
  ${pico_dragino_sx1276.lib_deps}
  densaugeo/base64 @ ~1.4.0
lib_ignore =
  BLE
  WiFi

[env:pico_dragino_repeater]
extends = pico_dragino_sx1276
build_flags =
  ${pico_dragino_sx1276.build_flags}
  -D ADVERT_NAME='"Pico Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
  -D PERSISTANT_GPS=1
build_src_filter = ${pico_dragino_sx1276.build_src_filter}
  +<../examples/simple_repeater>
lib_deps =
  ${pico_dragino_sx1276.lib_deps}