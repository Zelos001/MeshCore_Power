[ESP32_C3]
extends = esp32_base
board = esp32-c3-devkitm-1
build_flags =
  ${esp32_base.build_flags}
  -I variants/esp32c3_dxlr30

  -D ESP32_CPU_FREQ=80

  ; USB serial for ESP32-C3 SuperMini
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1

  ; ESP32-C3 <-----> DX-LR30 (SX1262)

  ; GPIO10 --------> SCK (SPI Clock)
  ; GPIO6 ---------- MISO (SPI)
  ; GPIO7 ---------> MOSI (SPI)
  ; GPIO5 ---------> NSS / CS (SPI Slave select)
  ; GPIO20 <-------- DIO1 (IRQ)
  ; GPIO4 <--------- BUSY
  ; GPIO21 --------> RESET
  ; GPIO2 ---------> RXEN
  ; GPIO3 ---------> TXEN
  ; 3V3 -----------> VCC (use 3.3v only)
  ; GND -----------> GND 

  -D P_LORA_SCLK=10
  -D P_LORA_MISO=6
  -D P_LORA_MOSI=7
  -D P_LORA_NSS=5
  -D P_LORA_DIO_1=20
  -D P_LORA_BUSY=4
  -D P_LORA_RESET=21
  -D SX126X_RXEN=2
  -D SX126X_TXEN=3

  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D SX126X_RX_BOOSTED_GAIN=1
  -D LORA_TX_POWER=22
  -D SX126X_DIO2_AS_RF_SWITCH=true
  ; -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140

  -D PIN_BOARD_SDA=8
  -D PIN_BOARD_SCL=9

build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/esp32c3_dxlr30>
  +<helpers/sensors>

lib_deps =
  ${esp32_base.lib_deps}


[env:ESP32_C3_repeater]
extends = ESP32_C3
build_src_filter = ${ESP32_C3.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
build_flags =
  ${ESP32_C3.build_flags}
  ${sensor_base.build_flags}
  -UENV_INCLUDE_GPS
  -UENV_INCLUDE_VL53L0X
  -D ADVERT_NAME='"ESP32 Repeater"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps =
  ${ESP32_C3.lib_deps}
  ${sensor_base.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0


[env:ESP32_C3_room_server]
extends = ESP32_C3
build_src_filter = ${ESP32_C3.build_src_filter}
  +<../examples/simple_room_server/*.cpp>
build_flags =
  ${ESP32_C3.build_flags}
  ${sensor_base.build_flags}
  -UENV_INCLUDE_GPS
  -UENV_INCLUDE_VL53L0X
  -D ADVERT_NAME='"ESP32 Room"'
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D ROOM_PASSWORD='"hello"'
;  -D MESH_PACKET_LOGGING=1
;  -D MESH_DEBUG=1
lib_deps =
  ${ESP32_C3.lib_deps}
  ${sensor_base.lib_deps}
  ${esp32_ota.lib_deps}
  bakercp/CRC32 @ ^2.0.0


